name: Bot Remediate
on:
  issue_comment:
    types: [created]

jobs:
  check-trigger:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@bot-remediate')
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ github.event.issue.number }}
      review-comment: ${{ github.event.comment.body }}
    steps:
      - run: echo "Trigger validated"

  remediate:
    needs: check-trigger
    uses: butlrtechnologies/github-automations/.github/workflows/bot-remediate.yml@main
    with:
      language: 'node'
      node-version: '18'
      verification-commands: '["npm run typecheck", "npm run lint", "npm run build", "npm test"]'
    secrets: inherit
