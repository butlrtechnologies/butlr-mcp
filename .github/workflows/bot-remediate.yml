name: Bot Remediate

on:
  issue_comment:
    types: [created]

jobs:
  remediate:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@bot-remediate')
    uses: butlrtechnologies/github-automations/.github/workflows/bot-remediate.yml@main
    with:
      language: 'node'
      node-version: '18'
      model: 'opus'
      max-turns: 100
      max-iterations: 3
      enable-playwright: false
    secrets:
      DOPE_BOT_KEY: ${{ secrets.DOPE_BOT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
