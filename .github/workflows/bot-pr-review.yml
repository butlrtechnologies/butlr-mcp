name: Bot PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    uses: butlrtechnologies/github-automations/.github/workflows/bot-pr-review.yml@main
    with:
      language: 'node'
      node-version: '18'
      model: 'opus'
      max-turns: 50
      enable-playwright: false
      enable-auto-approve: true
      team-slug: 'backend'
    secrets:
      DOPE_BOT_KEY: ${{ secrets.DOPE_BOT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MURDERBOT_GH_APP_ID: ${{ secrets.MURDERBOT_GH_APP_ID }}
      MURDERBOT_GH_PRIVATE_KEY: ${{ secrets.MURDERBOT_GH_PRIVATE_KEY }}
