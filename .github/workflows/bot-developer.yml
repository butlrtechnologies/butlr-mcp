name: Bot Developer

on:
  issues:
    types: [labeled]
  workflow_run:
    workflows: ["Bot Issue Enrichment", "Bot Maintainer"]
    types: [completed]

jobs:
  develop:
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'bot-developer') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    uses: butlrtechnologies/github-automations/.github/workflows/bot-developer.yml@main
    with:
      language: 'node'
      node-version: '18'
      model: 'opus'
      max-turns: 300
      max-parallel: 3
      enable-playwright: false
    secrets:
      DOPE_BOT_KEY: ${{ secrets.DOPE_BOT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
