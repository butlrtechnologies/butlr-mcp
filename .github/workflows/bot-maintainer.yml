name: Bot Maintainer

on:
  workflow_dispatch:
    inputs:
      max_findings:
        description: 'Number of findings to report'
        required: false
        default: '5'
        type: choice
        options: ['1', '2', '3', '5', '8', '13']
      components:
        description: 'Components to scan'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'tools', 'clients', 'utils', 'cache']
      dry_run:
        description: 'Preview findings without creating issues'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 10 * * 1'  # Monday 10am UTC

jobs:
  maintain:
    uses: butlrtechnologies/github-automations/.github/workflows/bot-maintainer.yml@main
    with:
      language: 'node'
      node-version: '18'
      model: 'opus'
      max-turns: 100
      max-findings: ${{ inputs.max_findings || '5' }}
      components: ${{ inputs.components || 'all' }}
      dry-run: ${{ inputs.dry_run || false }}
    secrets:
      DOPE_BOT_KEY: ${{ secrets.DOPE_BOT_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
