name: Bot Issue Enrichment

on:
  issues:
    types: [labeled]

jobs:
  enrich:
    if: github.event.label.name == 'user-feedback' || github.event.label.name == 'bot-enrich'
    uses: butlrtechnologies/github-automations/.github/workflows/bot-enrich.yml@main
    with:
      language: 'node'
      model: 'opus'
      max-turns: 50
      auto-label-developer: true
    secrets:
      DOPE_BOT_KEY: ${{ secrets.DOPE_BOT_KEY }}
